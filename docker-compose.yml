services:
  wavedge:
    build: .
    container_name: wavedge
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/wavedge.db
    volumes:
      - wavedge-data:/data
      - wavedge-backups:/backups
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      wavedge:
        condition: service_healthy

  # Daily SQLite backup at 2:00 AM UTC
  backup:
    image: alpine:3.20
    container_name: wavedge-backup
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache sqlite && \
        echo "0 2 * * * sqlite3 /data/wavedge.db '.backup /backups/wavedge-$(date +%Y%m%d).db' && find /backups -name '*.db' -mtime +7 -delete" | crontab - && \
        crond -f -l 2
    volumes:
      - wavedge-data:/data:ro
      - wavedge-backups:/backups

volumes:
  wavedge-data:
  wavedge-backups:
  caddy-data:
  caddy-config:
