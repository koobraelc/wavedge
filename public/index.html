<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wavedge — AI Crypto Intelligence</title>
  <meta name="description" content="Every crypto news article comes with a quantified price impact score. Real-time charts, news analysis, and cross-signal alerts.">
  <meta property="og:title" content="Wavedge — AI Crypto Intelligence">
  <meta property="og:description" content="Crypto news with quantified price impact scores. Charts, analysis, and alerts.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <nav-bar></nav-bar>

  <main class="main-content">
    <stats-row></stats-row>

    <price-chart></price-chart>

    <div class="tabs">
      <button class="tab-btn active" data-tab="prices-panel">Prices</button>
      <button class="tab-btn" data-tab="news-panel">News</button>
    </div>

    <div id="prices-panel" class="tab-panel active">
      <price-table></price-table>
    </div>

    <div id="news-panel" class="tab-panel">
      <news-feed></news-feed>
    </div>
  </main>

  <!-- Web Components -->
  <script src="/js/components/nav-bar.js"></script>
  <script src="/js/components/stats-row.js"></script>
  <script src="/js/components/price-table.js"></script>
  <script src="/js/components/news-feed.js"></script>
  <script src="/js/components/price-chart.js"></script>

  <!-- App -->
  <script src="/js/app.js"></script>
</body>
</html>
